<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <div class="card">
        <div class="display js-display"></div>
        <div class="calc-layout">
            <button class="btn operator main backspace js-btn">⌫</button>
            <button class="btn operator main js-btn">AC</button>
            <button class="btn operator main js-btn">%</button>
            <button class="btn operator js-btn">÷</button>
            <button class="btn js-btn">7</button>
            <button class="btn js-btn">8</button>
            <button class="btn js-btn">9</button>
            <button class="btn operator js-btn">*</button>
            <button class="btn js-btn">4</button>
            <button class="btn js-btn">5</button>
            <button class="btn js-btn">6</button>
            <button class="btn operator js-btn">-</button>
            <button class="btn js-btn">1</button>
            <button class="btn js-btn">2</button>
            <button class="btn js-btn">3</button>
            <button class="btn operator js-btn">+</button>
            <button class="btn js-btn">+/-</button>
            <button class="btn js-btn">0</button>
            <button class="btn js-btn">.</button>
            <button class="btn operator js-btn">=</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
